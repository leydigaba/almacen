<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Almacén</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e2990;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 35px;
            font-size: 16px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #3a5eff;
            color: white;
            border: none;
            border-radius: 35px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5a67d8;
        }
        
        .messages {
            margin-bottom: 20px;
        }
        
        .alert {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        footer {
            text-align: center;
            color: #0000007a;
            padding-top: 30px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Sistema de Almacén</h2>
        
        <div class="messages" id="messages-container">
            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible" data-auto-dismiss="3000">
                    <span class="close-btn" onclick="this.parentElement.style.opacity='0'; setTimeout(() => this.parentElement.remove(), 500);">&times;</span>
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}
        </div>
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Usuario</label>
                {{ form.username }}
            </div>
            <div class="form-group">
                <label for="id_password">Contraseña</label>
                {{ form.password }}
            </div>
            <button type="submit">Iniciar Sesión</button>
        </form>
        
        <footer>
            Sistema de Gestión de Almacén V1.0
        </footer>
    </div>
    
    <script>
        // Función para hacer desaparecer mensajes automáticamente
        function autoDismissMessages() {
            const messages = document.querySelectorAll('.alert-dismissible');
            messages.forEach(message => {
                const dismissTime = message.getAttribute('data-auto-dismiss');
                if (dismissTime) {
                    setTimeout(() => {
                        message.style.opacity = '0';
                        setTimeout(() => {
                            if (message.parentElement) {
                                message.remove();
                            }
                        }, 500);
                    }, parseInt(dismissTime));
                }
            });
        }
        
        // Ejecutar cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', function() {
            autoDismissMessages();
        });
        
        // Para mensajes que aparecen después (después de submit)
        // Observador de mutaciones para detectar nuevos mensajes
        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.addedNodes.length) {
                    autoDismissMessages();
                }
            });
        });
        
        const messagesContainer = document.getElementById('messages-container');
        if (messagesContainer) {
            observer.observe(messagesContainer, { childList: true, subtree: true });
        }
        
        // Limpiar mensajes cuando el usuario empieza a escribir
        const usernameInput = document.getElementById('id_username');
        const passwordInput = document.getElementById('id_password');
        
        function clearMessagesOnInput() {
            const messages = document.querySelectorAll('.alert');
            messages.forEach(message => {
                message.style.opacity = '0';
                setTimeout(() => {
                    if (message.parentElement) {
                        message.remove();
                    }
                }, 300);
            });
        }
        
        if (usernameInput) {
            usernameInput.addEventListener('focus', clearMessagesOnInput);
        }
        if (passwordInput) {
            passwordInput.addEventListener('focus', clearMessagesOnInput);
        }
    </script>
</body>
</html>
