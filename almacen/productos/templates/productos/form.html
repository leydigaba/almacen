<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if producto %}Editar{% else %}Crear{% endif %} Producto</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
        }
        .card {
            border-radius: 1rem;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
        }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card shadow-lg w-100" style="max-width: 500px;">
            <div class="card-header text-center bg-primary text-white rounded-top">
                <h3 class="mb-0">{% if producto %}Editar{% else %}Crear{% endif %} Producto</h3>
            </div>
            <div class="card-body p-4">
                {% if error %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        {{ error }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
                    </div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nombre:</label>
                        <input type="text" name="nombre" class="form-control" value="{{ producto.nombre|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Precio:</label>
                        <input type="number" step="0.01" name="precio" class="form-control" value="{{ producto.precio|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Stock:</label>
                        <input type="number" name="stock" class="form-control" value="{{ producto.stock|default:'' }}">
                    </div>

                    <button type="submit" class="btn btn-success w-100 py-2 fs-5">
                        {% if producto %}Actualizar{% else %}Crear{% endif %}
                    </button>
                </form>

                <a href="{% url 'lista_productos' %}" class="btn btn-outline-secondary w-100 mt-3 py-2">
                    ← Volver a lista
                </a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (opcional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
